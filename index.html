<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>期货合规监测系统</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    font-family:
    "Microsoft YaHei",
    Arial;

    background:#f4f6fa;

    color:#333;

}


.container{

    width:1200px;

    max-width:95%;

    margin:30px auto;

}



/* 顶部 */

.header{

    background:white;

    padding:35px;

    border-radius:12px;

    box-shadow:
    0 5px 20px rgba(0,0,0,.08);

}


.header h1{

    text-align:center;

    color:#1e5aa8;

    font-size:32px;

}


.header p{

    text-align:center;

    margin-top:15px;

    color:#666;

}




/* 数据统计 */

.statistics{

    display:flex;

    gap:20px;

    margin:25px 0;

}


.card{

    flex:1;

    background:white;

    padding:25px;

    border-radius:10px;

    text-align:center;

    box-shadow:
    0 4px 15px rgba(0,0,0,.08);

}


.card h2{

    color:#1e5aa8;

    font-size:32px;

}



.card span{

    color:#777;

}




/* 搜索 */

.search{

    background:white;

    padding:20px;

    border-radius:10px;

    margin-bottom:25px;

}



.search input{

    width:100%;

    padding:12px;

    border:

    1px solid #ddd;

    border-radius:6px;

    font-size:16px;

}




/* 信息卡片 */


.notice{

    background:white;

    border-radius:12px;

    padding:25px;

    margin-bottom:20px;

    box-shadow:

    0 4px 15px rgba(0,0,0,.08);


    border-left:

    5px solid #d9534f;

}



.company{


    font-size:22px;

    font-weight:bold;

    color:#b52b27;

    margin-bottom:15px;

}



.tag{


    display:inline-block;

    padding:5px 12px;

    border-radius:20px;

    background:#eef4ff;

    color:#1e5aa8;

    margin-right:10px;

    font-size:14px;


}



.info{

    margin-top:18px;

    line-height:1.8;

}



.label{

    font-weight:bold;

    color:#333;

}



.link{


    display:inline-block;

    margin-top:15px;

    color:#1e5aa8;

    text-decoration:none;

    font-weight:bold;

}


.link:hover{

    text-decoration:underline;

}



.footer{

    text-align:center;

    color:#888;

    margin:40px;

}



</style>

</head>



<body>


<div class="container">


<div class="header">

<h1>
📊 期货合规监测系统
</h1>


<p>
实时监测期货行业监管处罚、自律处分及风险信息
</p>


</div>



<div class="statistics">


<div class="card">

<h2 id="total">
0
</h2>

<span>
监管信息数量
</span>

</div>



<div class="card">

<h2 id="company">
0
</h2>

<span>
涉及机构
</span>

</div>



<div class="card">

<h2 id="source">
0
</h2>

<span>
监管来源
</span>

</div>


</div>





<div class="search">

<input
id="search"
placeholder="搜索公司名称、违规事项..."
>

</div>




<div id="list">


正在加载数据...


</div>



</div>




<div class="footer">

© 2026 期货合规监测系统

<br>

数据来源：中国期货业协会公开信息


</div>






<script>


let data=[];



async function loadData(){


try{


let res =
await fetch(
"./data/compliance_cases.json",
{
cache:"no-store"
}
);



data =
await res.json();



showData(data);



}
catch(e){


document.getElementById("list").innerHTML=

"数据加载失败";


}



}





function showData(items){


let html="";



let companies=new Set();

let sources=new Set();



items.forEach(item=>{


companies.add(
item.company
||
"未知机构"
);


sources.add(
item.source
);



html+=`


<div class="notice">


<div class="company">

${item.company || "未知机构"}

</div>



<span class="tag">

${item.source || "监管机构"}

</span>



<span class="tag">

${item.type || "监管信息"}

</span>




<div class="info">


<p>

<span class="label">
违规事项：
</span>

${item.violation || item.title || ""}

</p>



<p>

<span class="label">
处理结果：
</span>

${item.penalty || "详见公告"}

</p>



<p>

<span class="label">
日期：
</span>

${item.date || "暂无"}

</p>



</div>



<a class="link"

href="${item.url || '#'}"

target="_blank">

🔗 查看原文

</a>



</div>


`;



});



document.getElementById("list")
.innerHTML=html;



document.getElementById("total")
.innerHTML=items.length;


document.getElementById("company")
.innerHTML=companies.size;


document.getElementById("source")
.innerHTML=sources.size;



}





document
.getElementById("search")
.addEventListener(
"input",
function(){


let key=this.value;


let result=data.filter(
item=>

JSON.stringify(item)
.includes(key)

);



showData(result);


});




loadData();



</script>


</body>


</html>
