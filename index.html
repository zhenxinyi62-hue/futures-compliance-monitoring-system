<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>期货合规监测系统</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    font-family:
    "Microsoft YaHei",
    Arial,
    sans-serif;

    background:#f4f6fa;

    color:#333;

}



.container{

    width:95%;

    max-width:1200px;

    margin:20px auto;

}



.header{

    background:white;

    padding:30px;

    border-radius:12px;

    box-shadow:
    0 3px 15px rgba(0,0,0,.08);

    margin-bottom:20px;

}



.header h1{

    text-align:center;

    color:#1e6bd6;

    font-size:32px;

}



.subtitle{

    text-align:center;

    color:#777;

    margin-top:10px;

}



.update{

    text-align:center;

    margin-top:15px;

    color:#666;

}





.filter-box{


    background:white;

    padding:20px;

    border-radius:12px;

    margin-bottom:20px;


    display:grid;

    grid-template-columns:

    repeat(auto-fit,minmax(200px,1fr));

    gap:15px;


}



input,select,button{


    padding:10px;

    border-radius:6px;

    border:1px solid #ddd;

    font-size:14px;


}



button{


    background:#1e6bd6;

    color:white;

    cursor:pointer;

    border:none;


}


button:hover{

    background:#1454aa;

}






.statistics{


    display:grid;

    grid-template-columns:

    repeat(auto-fit,minmax(180px,1fr));


    gap:15px;

    margin-bottom:20px;


}




.card{


    background:white;

    padding:20px;

    border-radius:10px;

    text-align:center;


    box-shadow:

    0 3px 10px rgba(0,0,0,.08);


}



.number{


    font-size:30px;

    color:#1e6bd6;

    font-weight:bold;

}



.label{

    margin-top:8px;

    color:#666;

}







.data-area{


    background:white;

    padding:20px;

    border-radius:12px;


}





.item{


    border:1px solid #ddd;

    border-radius:10px;

    padding:20px;

    margin-bottom:15px;


    transition:.3s;


}



.item:hover{


    box-shadow:

    0 5px 15px rgba(0,0,0,.12);


}




.title{


    font-size:18px;

    font-weight:bold;

    color:#1e6bd6;

    margin-bottom:10px;


}



.tag{


    display:inline-block;

    background:#e8f1ff;

    color:#1e6bd6;

    padding:5px 12px;

    border-radius:20px;

    margin-right:8px;

    font-size:13px;


}



.info{


    line-height:1.8;

    margin-top:10px;


}



.info span{


    font-weight:bold;


}



.link{


    display:inline-block;

    margin-top:15px;

    color:#1e6bd6;

    text-decoration:none;

}



.link:hover{


    text-decoration:underline;

}





.pagination{


    text-align:center;

    margin:20px;


}



.pagination button{


    margin:5px;

}





.footer{


    text-align:center;

    color:#777;

    padding:20px;


}



</style>

</head>



<body>


<div class="container">



<div class="header">


<h1>
📊 期货合规监测系统
</h1>


<div class="subtitle">

实时监测期货行业违规、纪律处分及监管信息

</div>


<div class="update" id="updateTime">

数据加载中...

</div>


</div>







<div class="filter-box">


<input

id="search"

placeholder="搜索公司、人员、违规事项">


<select id="exchange">


<option value="">
全部机构
</option>


<option value="中期协">
中国期货业协会
</option>


<option value="上期所">
上海期货交易所
</option>


<option value="大商所">
大连商品交易所
</option>


<option value="郑商所">
郑州商品交易所
</option>


<option value="中金所">
中国金融期货交易所
</option>


</select>





<select id="type">


<option value="">
全部类型
</option>


<option value="纪律处分">
纪律处分
</option>


<option value="违规">
违规
</option>


<option value="处罚">
处罚
</option>


<option value="通知">
通知
</option>


</select>




<button onclick="clearFilter()">

清空筛选

</button>


</div>








<div class="statistics">


<div class="card">

<div class="number" id="total">

0

</div>

<div class="label">

总记录数

</div>

</div>





<div class="card">

<div class="number" id="companyCount">

0

</div>

<div class="label">

涉及机构

</div>

</div>





<div class="card">

<div class="number" id="typeCount">

0

</div>

<div class="label">

处分类型

</div>

</div>




</div>









<div class="data-area">


<h2>
违规/纪律处分记录
</h2>


<div id="list">

加载中...

</div>


</div>






<div class="pagination">


<button onclick="prevPage()">

上一页

</button>


<span id="pageInfo">

</span>


<button onclick="nextPage()">

下一页

</button>


</div>



</div>



<div class="footer">

© 2026 期货合规监测系统

</div>





<script>

// 第2部分从这里开始替换
let allData = [];

let filteredData = [];

let currentPage = 1;

const pageSize = 10;



// 页面加载

document.addEventListener(
    "DOMContentLoaded",
    function(){

        loadData();

        document
        .getElementById("search")
        .addEventListener(
            "input",
            filterData
        );


        document
        .getElementById("exchange")
        .addEventListener(
            "change",
            filterData
        );


        document
        .getElementById("type")
        .addEventListener(
            "change",
            filterData
        );

    }
);






// 读取JSON

async function loadData(){


    try{


        const response = await fetch(

            "./data/compliance_cases.json",

            {
                cache:"no-store"
            }

        );



        const json = await response.json();



        allData = json;



        filteredData = [...allData];



        updateStatistics();



        filterData();



        document
        .getElementById("updateTime")
        .innerHTML =
        "数据更新时间：" +
        new Date()
        .toLocaleString();



    }

    catch(error){


        document
        .getElementById("list")
        .innerHTML =
        `
        <h3>
        数据加载失败
        </h3>
        <p>
        请检查 data/compliance_cases.json 是否存在
        </p>
        `;


        console.log(error);


    }


}









// 筛选

function filterData(){


    let keyword =
    document
    .getElementById("search")
    .value
    .toLowerCase();



    let exchange =
    document
    .getElementById("exchange")
    .value;



    let type =
    document
    .getElementById("type")
    .value;





    filteredData =
    allData.filter(

        item=>{


            let text = (

                (item.company || "") +

                (item.title || "") +

                (item.violation || "")

            )
            .toLowerCase();



            let matchKeyword =
            !keyword ||
            text.includes(keyword);



            let matchExchange =
            !exchange ||
            item.exchange === exchange;



            let matchType =
            !type ||
            item.type === type;



            return (

                matchKeyword
                &&
                matchExchange
                &&
                matchType

            );

        }

    );



    currentPage=1;



    render();

}





// 展示数据

function render(){


    let start =
    (currentPage-1)
    *
    pageSize;



    let end =
    start+
    pageSize;



    let pageData =
    filteredData.slice(
        start,
        end
    );



    let html="";



    if(pageData.length===0){


        html=
        `
        <div class="item">
        暂无数据
        </div>
        `;


    }



    pageData.forEach(

        item=>{


            html +=

`
<div class="item">


<div class="title">

${escapeHtml(item.company || "未识别机构")}

</div>



<div>

<span class="tag">
${item.source || "中国期货业协会"}
</span>


<span class="tag">
${item.type || "纪律处分"}
</span>

</div>



<div class="info">


<p>

<span>
事项：
</span>

${escapeHtml(item.title || item.violation)}

</p>



<p>

<span>
涉及机构：
</span>

${escapeHtml(item.company || "未识别机构")}

</p>



<p>

<span>
日期：
</span>

${item.date || ""}

</p>



<p>

<span>
处分内容：
</span>

${escapeHtml(item.penalty || "详见公告")}

</p>



</div>



<a

class="link"

href="${item.url}"

target="_blank"

>

🔗 查看中国期货业协会公告

</a>



</div>

`;

        }

    );



    document
    .getElementById("list")
    .innerHTML =
    html;



    document
    .getElementById("pageInfo")
    .innerHTML =

    `
    第 ${currentPage}
    /
    ${Math.ceil(
        filteredData.length/pageSize
    ) || 1}
    页
    `;



}









// 统计

function updateStatistics(){


    document
    .getElementById("total")
    .innerHTML =
    allData.length;



    let companies =
    new Set(

        allData.map(

            x=>x.company

        )

    );



    document
    .getElementById("companyCount")
    .innerHTML =
    companies.size;



    let types =
    new Set(

        allData.map(

            x=>x.type

        )

    );


    document
    .getElementById("typeCount")
    .innerHTML =
    types.size;


}







// 清空

function clearFilter(){


    document
    .getElementById("search")
    .value="";


    document
    .getElementById("exchange")
    .value="";


    document
    .getElementById("type")
    .value="";


    filterData();


}








// 分页

function nextPage(){


    let max =
    Math.ceil(
        filteredData.length/pageSize
    );



    if(currentPage < max){

        currentPage++;

        render();

    }


}




function prevPage(){


    if(currentPage>1){

        currentPage--;

        render();

    }


}






// 防止特殊字符影响页面

function escapeHtml(str){


    if(!str)
        return "";



    return str
    .replace(
        /&/g,
        "&amp;"
    )
    .replace(
        /</g,
        "&lt;"
    )
    .replace(
        />/g,
        "&gt;"
    )
    .replace(
        /"/g,
        "&quot;"
    );

}


</script>


</body>

</html>
