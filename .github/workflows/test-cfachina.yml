name: Test CFA Crawler

on:
  workflow_dispatch:


jobs:

  test:

    runs-on: ubuntu-latest


    steps:

      - uses: actions/checkout@v4


      - uses: actions/setup-python@v5

        with:

          python-version: "3.12"


      - name: Install

        run: |

          pip install requests beautifulsoup4


      - name: Run CFA crawler

        run: |

          python crawler/cfachina.py


      - name: Commit JSON

        run: |

          git config user.name github-actions

          git config user.email github-actions@github.com


          git add data/compliance_cases.json


          if ! git diff --cached --quiet; then

            git commit -m "Update CFA compliance data"

            git push

          fi
