name: Daily CFA Discipline Scraper

on:
  schedule:
    - cron: "30 22 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install --with-deps chromium

      - name: Run scraper
        run: |
          python cfa_discipline_scraper.py --pages 2 --out data/discipline_raw.json --app-json data/dynamics.json --violations-json data/violations.json

      - name: Commit updated data
        run: |
          git config user.name "data-bot"
          git config user.email "data-bot@users.noreply.github.com"
          git add data/discipline_raw.json data/dynamics.json data/violations.json
          git diff --cached --quiet || git commit -m "auto update"
          git push
