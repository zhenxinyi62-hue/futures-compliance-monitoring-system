name: 每日抓取中期协纪律处分数据

on:
  schedule:
    # UTC 22:30 = 北京时间次日 06:30，工作日抓取即可，可按需调整
    - cron: '30 22 * * 0-4'
  workflow_dispatch: {}   # 也支持手动点击 "Run workflow" 立即跑一次

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install --with-deps chromium

      - name: 运行抓取脚本
        run: |
          python cfa_discipline_scraper.py --pages 2 \
            --out data/discipline_raw.json \
            --app-json data/dynamics.json \
            --violations-json data/violations.json

      - name: 提交更新后的数据文件
        run: |
          git config user.name "data-bot"
          git config user.email "data-bot@users.noreply.github.com"
          git add data/discipline_raw.json data/dynamics.json data/violations.json
          git diff --cached --quiet || git commit -m "自动更新: $(date -u +%Y-%m-%d)"
          git push
